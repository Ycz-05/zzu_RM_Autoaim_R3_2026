# ==================== 基础配置 ====================
# 敌方颜色：识别敌方装甲板的颜色，用于过滤目标
# 可选值："red"（红色）或 "blue"（蓝色）
enemy_color: "red"
# enemy_color: "blue"

# ==================== 神经网络参数 ====================
# YOLO模型名称：指定使用的YOLO版本
# 可选值：yolov5, yolov8, yolo11
yolo_name: yolov5

# 分类模型路径：用于识别装甲板上的数字/字母（0-9, A-Z）
# 使用轻量级ResNet模型进行分类
classify_model: assets/tiny_resnet.onnx

# YOLO11模型路径：YOLO11模型的OpenVINO格式文件路径（.xml为模型描述文件）
yolo11_model_path: assets/yolo11.xml

# YOLO8模型路径：YOLO8模型的OpenVINO格式文件路径
yolov8_model_path: assets/yolo11.xml

# YOLO5模型路径：YOLO5模型的OpenVINO格式文件路径
yolov5_model_path: assets/yolo11.xml

# 推理设备：指定模型推理使用的设备
# 可选值：CPU（CPU推理）, GPU（GPU推理，需要支持OpenVINO的GPU）
device: GPU

# 最小置信度：神经网络检测结果的置信度阈值
# 取值范围：0.0 - 1.0
# 低于此值的检测结果将被过滤，值越高要求越严格，可减少误检
min_confidence: 0.8

# 是否使用传统方法：当神经网络检测失败时，是否使用传统图像处理方法作为备用
# true：启用传统方法作为备用
# false：仅使用神经网络检测
use_traditional: true

# ==================== ROI（感兴趣区域）参数 ====================
# ROI区域定义：定义图像中的感兴趣区域，仅在此区域内进行目标检测
# 可以减少计算量，提高检测速度
roi: 
  x: 420      # ROI左上角x坐标（像素）
  y: 50       # ROI左上角y坐标（像素）
  width: 600  # ROI宽度（像素）
  height: 600 # ROI高度（像素）

# 是否启用ROI：是否使用上述定义的ROI区域
# true：仅在ROI区域内检测
# false：在整个图像中检测
use_roi: false

# ==================== 传统方法参数（图像处理备用方案） ====================
# 二值化阈值：用于将图像转换为二值图像，提取亮灯条
# 取值范围：0-255，值越大越严格
threshold: 150

# 最大角度误差：灯条与垂直方向的最大允许角度偏差
# 单位：度（degree）
# 超过此角度的灯条将被过滤
max_angle_error: 45 # degree

# 最小灯条长宽比：灯条的最小长度/宽度比值
# 用于过滤过短的灯条
min_lightbar_ratio: 1.5

# 最大灯条长宽比：灯条的最大长度/宽度比值
# 用于过滤过长的灯条
max_lightbar_ratio: 20

# 最小灯条长度：灯条的最小像素长度
# 单位：像素
min_lightbar_length: 8

# 最小装甲板长宽比：装甲板的最小长度/宽度比值
min_armor_ratio: 1

# 最大装甲板长宽比：装甲板的最大长度/宽度比值
max_armor_ratio: 5

# 最大侧边比：装甲板两对边长度比值的最大允许值
# 用于判断装甲板是否为矩形
max_side_ratio: 1.5

# 最大矩形误差：装甲板与理想矩形的最大角度偏差
# 单位：度（degree）
max_rectangular_error: 25 # degree

# ==================== 跟踪器（Tracker）参数 ====================
# 最小检测次数：目标需要连续被检测到多少次才能被确认为有效目标
# 用于过滤短暂出现的误检目标，提高稳定性
min_detect_count: 5

# 最大临时丢失次数：目标可以连续丢失多少帧仍然保持跟踪
# 超过此值后目标将被移除，跟踪器重新寻找新目标
# 单位：帧数
max_temp_lost_count: 15

# 哨兵最大临时丢失次数：哨兵模式下的最大临时丢失次数
# 哨兵需要跟踪更长时间，因此允许更长的丢失时间
# 单位：帧数
outpost_max_temp_lost_count: 75

# ==================== 瞄准器（Aimer）参数 ====================
# Yaw轴角度偏移：yaw轴的校准偏移量，用于补偿机械安装误差
# 单位：度（degree），正值表示向右偏，负值表示向左偏
# 需要根据实际调试情况调整
yaw_offset: 2 # degree -2.5

# Pitch轴角度偏移：pitch轴的校准偏移量，用于补偿机械安装误差
# 单位：度（degree），正值表示向上偏，负值表示向下偏
# 需要根据实际调试情况调整
pitch_offset: 6.5 # degree 2

# 接近角度：判断目标接近时的角度阈值
# 单位：度（degree）
# 当目标进入此角度范围内时，认为是接近状态
comming_angle: 55 # degree

# 离开角度：判断目标离开时的角度阈值
# 单位：度（degree）
# 当目标离开此角度范围时，认为是离开状态
leaving_angle: 20 # degree

# 决策速度：用于区分高速和低速运动状态的角速度阈值
# 单位：弧度/秒（rad/s）
# 超过此速度的目标被认为是高速运动，可能采用不同的控制策略
decision_speed: 7 # rad/s

# 高速延迟时间：高速运动状态下的预测延迟时间
# 单位：秒（s）
# 用于补偿高速运动时的系统延迟
high_speed_delay_time: 0.0 # s

# 低速延迟时间：低速运动状态下的预测延迟时间
# 单位：秒（s）
# MPC规划器使用此值进行轨迹预测
# 用于补偿低速运动时的系统延迟（图像处理、通信等）
low_speed_delay_time: 0.0 # s planner use this value

# ==================== 射击器（Shooter）参数 ====================
# 第一容差（近距离）：近距离射击时的角度误差容差
# 单位：度（degree）
# 当瞄准误差小于此值时，允许开火
first_tolerance: 3 # 近距离射击容差，degree

# 第二容差（远距离）：远距离射击时的角度误差容差
# 单位：度（degree）
# 当瞄准误差小于此值时，允许开火
second_tolerance: 2 # 远距离射击容差，degree

# 距离判断阈值：用于区分近距离和远距离的距离阈值
# 单位：米（m）
# 距离小于此值使用first_tolerance，大于此值使用second_tolerance
judge_distance: 2 #距离判断阈值

# 自动开火：是否由自瞄系统自动控制开火
# true：自瞄自动判断开火时机
# false：不自瞄控制，由操作手或其他系统控制
auto_fire: true # 是否由自瞄控制射击

# ==================== 相机参数 ====================
# 相机名称：指定使用的相机类型
# 可选值："hikrobot"（海康工业相机）、"mindvision"（迈德威视工业相机）、"usbcamera"（USB摄像头）
camera_name: "hikrobot"

# 曝光时间：相机的曝光时间
# 单位：毫秒（ms）
# 值越小画面越暗但运动模糊越小，值越大画面越亮但运动模糊越大
exposure_ms: 2.5

# 增益：相机的增益值（仅海康相机使用）
# 用于提高画面亮度，但会增加噪点
gain: 16.9

# VID_PID：USB设备的厂商ID和产品ID
# 格式："vid:pid"（十六进制）
# 用于识别特定的相机设备
vid_pid: "2bdf:0001"

# ==================== 坐标系变换矩阵 ====================
# 云台到IMU体坐标系的旋转矩阵（3x3）
# 用于将云台坐标系下的数据转换到IMU体坐标系
# 格式：[r11, r12, r13, r21, r22, r23, r31, r32, r33]
#  1  0  0
#  0  1  0
#  0  0  1
R_gimbal2imubody: [0, -1, 0, 1, 0, 0, 0, 0, 1]

# 云台到IMU体坐标系的平移向量（3x1）
# 单位：米（m）
# 格式：[tx, ty, tz]
# 表示IMU坐标系原点相对于云台坐标系原点的位置
# IMU相对于云台中心y轴后移了0.09m
t_gimbal2imubody: [0, -0.09, 0]

# 相机内参矩阵：相机的内参标定结果（3x3矩阵）
# 格式：[fx, 0, cx, 0, fy, cy, 0, 0, 1]
# fx, fy：焦距（像素）
# cx, cy：主点坐标（像素）
# 用于将3D点投影到图像平面
# 重投影误差: 0.1820px（标定精度指标，越小越好）
camera_matrix: [1857.0609966793593, 0, 732.45919359100446, 0, 1857.8401866838676, 584.08789201878199, 0, 0, 1]

# 畸变系数：相机的畸变校正参数（5个参数）
# 格式：[k1, k2, p1, p2, k3]
# k1, k2, k3：径向畸变系数
# p1, p2：切向畸变系数
# 用于校正图像畸变
distort_coeffs: [-0.05439951596889292, 0.084190504363284666, 0.0022130308873479698, 0.0027567971062816316, 0]

# 相机到云台的旋转矩阵（3x3）：手眼标定结果
# 用于将相机坐标系下的点转换到云台坐标系
# 格式：[r11, r12, r13, r21, r22, r23, r31, r32, r33]

# 相机同理想情况的偏角: yaw1.44 pitch-7.28 roll0.96 degree
# 标定板到世界坐标系原点的水平距离: 1.13 m
# 标定板同竖直摆放时的偏角: yaw7.61 pitch13.92 roll-0.46 degree
R_camera2gimbal: [0.55293653030561163, -0.81065560077057741, -0.19261020324189873, 0.76219239405386052, 0.39870640092419152, 0.50999603950278127, -0.33663622487788786, -0.42880147248041506, 0.83833486704215765]

# 相机到云台的平移向量（3x1）：手眼标定结果
# 单位：米（m）
# 格式：[tx, ty, tz]
# 表示相机坐标系原点相对于云台坐标系原点的位置
t_camera2gimbal: [0.18727643058841448, 0.0098357344541164758, -0.3667888635904728]

# ==================== C板（CAN总线通信）参数 ====================
# 四元数CAN ID：接收云台姿态四元数的CAN消息ID
# 格式：十六进制（0x开头的十六进制数）
# 下位机通过此ID发送IMU四元数数据
quaternion_canid: 0x100

# 弹速CAN ID：接收子弹速度的CAN消息ID
# 下位机通过此ID发送子弹速度（m/s）、模式等信息
bullet_speed_canid: 0x101

# 发送CAN ID：向上位机发送控制指令的CAN消息ID
# 上位机通过此ID向下位机发送控制指令
send_canid: 0xff

# CAN接口名称：指定使用的CAN接口
# Linux系统中常见的CAN接口：can0, can1等
can_interface: "can0"

# ==================== 云台（串口通信）参数 ====================
# 串口设备路径：云台通信使用的串口设备路径
# Linux系统中常见的串口设备：/dev/ttyACM0, /dev/ttyUSB0等
# 可以通过udev规则创建固定名称，如/dev/gimbal
com_port: "/dev/gimbal"

# Yaw轴比例系数（PID控制器的Kp参数）
# 如果下位机使用PID控制，可以在此配置Kp值
# 0表示不由上位机配置，由下位机自行控制
yaw_kp: 0

# Yaw轴微分系数（PID控制器的Kd参数）
yaw_kd: 0

# Pitch轴比例系数（PID控制器的Kp参数）
pitch_kp: 0

# Pitch轴微分系数（PID控制器的Kd参数）
pitch_kd: 0

# ==================== MPC轨迹规划器（Planner）参数 ====================
# 开火阈值：判断是否开火的角度误差阈值
# 单位：弧度（rad）
# 当规划轨迹与射击轨迹的误差小于此值时，允许开火
# 值越小要求越严格，命中率更高但开火频率更低
fire_thresh: 0.0035

# Yaw轴最大加速度：云台yaw轴的最大角加速度限制
# 单位：弧度/秒²（rad/s²）
# MPC规划器会确保生成的轨迹加速度不超过此值
# 应根据实际云台的硬件能力设置
max_yaw_acc: 50

# Yaw轴状态权重矩阵（MPC优化器的Q矩阵）
# 格式：[位置权重, 速度权重]
# 用于MPC优化，权重越大表示对该状态的控制精度要求越高
# [9e6, 0]表示更关注位置精度，不关注速度
Q_yaw: [9e6, 0]

# Yaw轴控制权重矩阵（MPC优化器的R矩阵）
# 格式：[控制量权重]
# 用于MPC优化，权重越大表示对控制量的惩罚越大（更平滑）
R_yaw: [1]

# Pitch轴最大加速度：云台pitch轴的最大角加速度限制
# 单位：弧度/秒²（rad/s²）
max_pitch_acc: 100

# Pitch轴状态权重矩阵（MPC优化器的Q矩阵）
Q_pitch: [9e6, 0]

# Pitch轴控制权重矩阵（MPC优化器的R矩阵）
R_pitch: [1]

# ==================== 能量机关识别器（Buff Detector）参数 ====================
# 能量机关识别模型路径：用于识别能量机关扇叶的YOLO模型
# 使用YOLO11模型的INT8量化版本（性能更好）
model: "assets/yolo11_buff_int8.xml"

# ==================== 能量机关瞄准器（Buff Aimer）参数 ====================
# 开火间隔时间：两次开火之间的最小时间间隔
# 单位：秒（s）
# 用于控制能量机关的击打频率，避免连续击打同一扇叶
fire_gap_time: 0.700   # s

# 预测时间：预测能量机关未来位置的时间长度
# 单位：秒（s）
# 用于计算提前量，确保子弹能够命中移动的扇叶
predict_time: 0.120     # s
